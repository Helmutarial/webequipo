services:
  web:
    build: .
    container_name: aldapan-gora-web
    restart: unless-stopped
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    expose:
      - "3000"
    volumes:
      - aldapan_data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: aldapan-gora-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy

volumes:
  aldapan_data:
  caddy_data:
  caddy_config:
