services:
  web:
    build: .
    container_name: aldapan-gora-web
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - aldapan_data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: aldapan-gora-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  aldapan_data:
  caddy_data:
  caddy_config:
